<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notino – Nákupní košík (interaktivní)</title>
<style>
body{margin:0;background:#e9e9ec;}
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
:root{
  --color-text-primary:#000; --color-text-secondary:#474747;
  --color-text-tertiary:#6B6B6B; --color-text-disabled:#ABABAB;
  --color-text-positive:#187C18; --color-text-accent:#DC0069;
  --color-background-primary:#FFF; --color-background-secondary:#F7F7F7;
  --color-background-disabled:#F7F7F7; --color-background-inverse:#000;
  --color-loyalty-light-blue:#F0F2F8;
  --color-border-divider:#E1E1E1; --color-border-default:#ABABAB;
  --color-border-positive:#187C18;
  --radius-sm:2px; --radius-md:4px; --radius-pill:40px;
}
.ncart *{box-sizing:border-box;}
.ncart{width:375px;margin:0 auto;background:var(--color-background-primary);
  font-family:Roboto,Arial,Helvetica,sans-serif;display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.15);min-height:100vh;}
.t-title-lg{font:500 24px/32px Roboto,Arial,sans-serif;}
.t-label-lg-500{font:500 16px/20px Roboto,Arial,sans-serif;}
.t-label-lg-400{font:400 16px/20px Roboto,Arial,sans-serif;}
.t-body{font:400 14px/24px Roboto,Arial,sans-serif;}
.t-label-400{font:400 14px/20px Roboto,Arial,sans-serif;}
.t-label-500{font:500 14px/20px Roboto,Arial,sans-serif;}
.t-label-700{font:700 14px/20px Roboto,Arial,sans-serif;}
.t-label-sm{font:400 12px/16px Roboto,Arial,sans-serif;}

.ncart .main{display:flex;flex-direction:column;align-items:center;gap:16px;padding:0;}
.ncart .page-title{color:var(--color-text-primary);text-align:center;padding:16px 0;margin:0;}
.ncart .col{width:343px;max-width:343px;}

.free-delivery{display:flex;flex-direction:column;align-items:center;gap:8px;align-self:stretch;padding:0 16px;}
.free-delivery__row{display:flex;align-items:center;gap:8px;}
.free-delivery__track{height:6px;align-self:stretch;background:var(--color-border-divider);width:100%;overflow:hidden;}
.free-delivery__bar{height:6px;background:var(--color-border-positive);transition:width .25s ease;}

.product{position:relative;display:flex;gap:16px;padding:16px 0;border-top:1px solid var(--color-border-divider);background:var(--color-background-primary);}
.product__img{width:64px;height:64px;flex-shrink:0;background-size:cover;background-position:center;}
.product__body{display:flex;flex-direction:column;gap:16px;flex:1;min-width:160px;}
.product__text{display:flex;flex-direction:column;gap:4px;padding-right:24px;}
.product__name{color:var(--color-text-primary);}
.product__name b{font-weight:700;}
.product__sub{color:var(--color-text-secondary);}
.product__controls{display:flex;align-items:center;justify-content:space-between;}
.product__remove{position:absolute;top:16px;right:0;width:16px;height:16px;border:0;background:none;padding:0;cursor:pointer;}
.product__price{color:var(--color-text-primary);text-align:right;}

.stepper{display:flex;align-items:center;}
.stepper__btn{width:32px;height:32px;padding:8px;display:flex;justify-content:center;align-items:center;flex-shrink:0;border:0;cursor:pointer;border-radius:var(--radius-pill);background:var(--color-background-disabled);}
.stepper__btn:disabled{opacity:.45;cursor:not-allowed;}
.stepper__btn--plus{background:var(--color-background-secondary);}
.stepper__count{width:24px;text-align:center;color:var(--color-text-primary);}

.gift{display:flex;flex-direction:column;gap:32px;padding:16px 0;border-top:1px solid var(--color-border-divider);}
.gift__head{display:flex;align-items:center;gap:8px;cursor:pointer;}
.gift__head-title{color:var(--color-text-primary);flex:1;}
.gift__head-title b{font-weight:500;}
.gift__chev{transition:transform .2s ease;}
.gift__chev--open{transform:rotate(180deg);}
.gift__list{display:flex;flex-direction:column;gap:8px;align-self:stretch;}
.gift__sub{color:var(--color-text-secondary);align-self:flex-start;}
.gift-option{display:flex;padding:10px 15px;align-items:center;gap:20px;align-self:stretch;cursor:pointer;border-radius:var(--radius-sm);}
.gift-option--sel{background:var(--color-background-secondary);}
.radio{width:20px;height:20px;border-radius:50%;border:1px solid var(--color-border-default);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.radio__dot{width:10px;height:10px;border-radius:50%;background:var(--color-text-accent);}
.gift-option__img{width:50px;height:50px;background-size:cover;flex-shrink:0;}
.gift-option__text{display:flex;flex-direction:column;gap:2px;}
.gift-option__title{color:var(--color-text-primary);}
.gift-option__title b{font-weight:500;}
.gift-option__desc{color:var(--color-text-secondary);}

.services{display:flex;flex-direction:column;align-items:stretch;}
.service{display:flex;flex-direction:column;gap:8px;padding:16px 0;border-top:1px solid var(--color-border-divider);}
.service__row{display:flex;align-items:center;gap:8px;cursor:pointer;}
.checkbox{width:16px;height:16px;padding:0;border-radius:2px;border:1px solid var(--color-border-default);background:var(--color-background-primary);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.checkbox--on{background:var(--color-background-inverse);border-color:var(--color-background-inverse);}
.service__title{color:var(--color-text-primary);}
.service__info{width:14px;height:14px;flex-shrink:0;}
.service__price{margin-left:auto;color:var(--color-text-disabled);}
.service__desc{color:var(--color-text-tertiary);padding-left:24px;margin:0;}

.disc-line{padding:16px 0;border-top:1px solid var(--color-border-divider);color:var(--color-text-primary);display:flex;justify-content:space-between;}

.voucher{display:flex;flex-direction:column;gap:8px;padding:16px 0;border-top:1px solid var(--color-border-divider);}
.voucher__title{color:var(--color-text-primary);}
.voucher__box{display:flex;align-items:center;align-self:stretch;border:1px solid var(--color-border-default);border-radius:var(--radius-sm);}
.voucher__box--err{border-color:var(--color-text-accent);}
.voucher__input{flex:1;padding:12px 16px;border:0;outline:0;font:400 14px/20px Roboto;color:var(--color-text-primary);background:none;}
.voucher__input::placeholder{color:var(--color-text-tertiary);}
.voucher__apply{width:72px;padding:8px 16px;display:flex;justify-content:center;align-items:center;border:0;background:none;cursor:pointer;color:var(--color-text-primary);}
.voucher__msg{color:var(--color-text-accent);}

.club{display:flex;flex-direction:column;gap:8px;padding:16px 0;border-top:1px solid var(--color-border-divider);}
.club__title{color:var(--color-text-primary);}
.club__banner{display:flex;align-items:center;gap:8px;background:var(--color-loyalty-light-blue);border-radius:var(--radius-md);padding:12px 16px;}
.club__banner-text{color:var(--color-text-secondary);}
.club__banner-text b{font-weight:700;color:var(--color-text-primary);}

.total{display:flex;width:100%;padding:14px 16px;justify-content:space-between;align-items:center;background:var(--color-background-secondary);}
.total__label{color:var(--color-text-primary);}
.total__amount{color:var(--color-text-primary);text-align:center;}

.cta{display:flex;flex-direction:column;gap:12px;padding:16px;}
.btn{display:flex;padding:12px 24px;justify-content:center;align-items:center;gap:8px;border-radius:var(--radius-sm);cursor:pointer;font:500 14px/20px Roboto;}
.btn--primary{background:var(--color-background-inverse);color:#fff;border:0;}
.btn--secondary{background:var(--color-background-primary);color:var(--color-text-primary);border:1px solid var(--color-border-default);}
</style>
</head>
<body>
<div class="ncart" id="app"></div>
<script>
/* ---------- state ---------- */
const state = {

    { id:2, brand:"Burberry", name:"Mr. Burberry", subtitle:"parfémová voda pro muže 30 ml", unitPrice:1306, qty:1, image:"#2b2b33" },
    { id:3, brand:"Burberry", name:"Multiline", subtitle:"hrací karty", unitPrice:0, qty:1, image:"#8f1d1d", isGift:true },

  services: [
    { key:"wrap", title:"Zabalit jako dárek", price:120, checked:false, hasInfo:true, desc:"Rádi vám vše zabalíme do luxusního dárkového balení. Více informací" },
    { key:"eco", title:"Zabalit ekologicky", price:25, checked:false, hasInfo:true, desc:"Pomozte nám šetřit životní prostředí a využijte balení z recyklovaného materiálu bez plastu. Tato služba není dostupná při doručení do obchodů Notino a jejich výdejních míst." },

6 5.1303 6.25004 4.99224C6.25153 4.85415 6.29273 4.71486 6.37501 4.58868C6.45768 4.46191 6.58031 4.35115 6.73564 4.27432C6.89123 4.19735 7.06999 4.15942 7.25211 4.16781C7.4342 4.17621 7.60663 4.23031 7.75112 4.31984ZM10.8333 10.8333H15V15.8333H10.8333V10.8333ZM9.16667 10.8333V15.8333H5V10.8333H9.16667Z" fill="#DC0069"/></svg>',

  info:'<svg class="service__info" width="14" height="14" viewBox="0 0 14 14" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M1.16602 7.00008C1.16602 3.77842 3.77769 1.16675 6.99935 1.16675C10.221 1.16675 12.8327 3.77842 12.8327 7.00008C12.8327 10.2217 10.221 12.8334 6.99935 12.8334C3.77769 12.8334 1.16602 10.2217 1.16602 7.00008ZM6.27018 4.81258C6.27018 4.40987 6.59664 4.08341 6.99935 4.08341C7.40206 4.08341 7.72852 4.40987 7.72852 4.81258C7.72852 5.21529 7.40206 5.54175 6.99935 5.54175C6.59664 5.54175 6.27018 5.21529 6.27018 4.81258ZM7.58268 6.41675V9.91675H6.41602V6.41675H7.58268Z" fill="#6B6B6B"/></svg>',

  check:'<svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6l3 3 5-6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>',
};

/* ---------- derived ---------- */
function derive(){
  const itemsSubtotal = state.items.filter(i=>!i.isGift).reduce((s,i)=>s+i.unitPrice*i.qty,0);
  const servicesTotal = state.services.filter(s=>s.checked).reduce((s,x)=>s+x.price,0);
  const discount = state.voucher && state.voucher.type==="pct" ? Math.round(itemsSubtotal*state.voucher.value) : 0;
  const total = Math.max(0, itemsSubtotal + servicesTotal - discount);
  const points = Math.round(total*POINTS_PER_KC);
  const deliveryProgress = Math.min(100, itemsSubtotal/FREE_DELIVERY_THRESHOLD*100);
  const freeDelivery = itemsSubtotal >= FREE_DELIVERY_THRESHOLD;
  return { itemsSubtotal, servicesTotal, discount, total, points, deliveryProgress, freeDelivery };
}

/* ---------- render ---------- */
function render(){
  const d = derive();
  const app = document.getElementById("app");
  app.innerHTML = `
  <main class="main">
    <h1 class="page-title t-title-lg">Nákupní košík</h1>

    <div class="free-delivery">
      <div class="free-delivery__row" style="color:${d.freeDelivery?'var(--color-text-positive)':'var(--color-text-secondary)'}">
        ${I.truck}<span class="t-label-lg-500">${d.freeDelivery?'Doprava zdarma na vybrané způsoby dopravy':'Do dopravy zdarma zbývá '+kc(FREE_DELIVERY_THRESHOLD-d.itemsSubtotal)}</span>
      </div>
      <div class="free-delivery__track"><div class="free-delivery__bar" style="width:${d.deliveryProgress}%"></div></div>
    </div>

    <div class="col">
      ${state.items.map(item => `
        <div class="product">
          <div class="product__img" style="background:${item.image}"></div>
          <div class="product__body">
            <div class="product__text">
              <span class="product__name t-label-400">${esc(item.brand)} <b>${esc(item.name)}</b></span>
              <span class="product__sub t-body">${esc(item.subtitle)}</span>
            </div>
            <div class="product__controls">
              ${item.isGift
                ? `<span class="t-label-500" style="padding-left:8px">${item.qty}</span>`
                : `<div class="stepper">
                     <button class="stepper__btn" data-act="dec" data-id="${item.id}" ${item.qty<=1?'disabled':''}>${I.minus}</button>
                     <span class="stepper__count t-label-500">${item.qty}</span>
                     <button class="stepper__btn stepper__btn--plus" data-act="inc" data-id="${item.id}">${I.plus}</button>
                   </div>`}
              <span class="product__price t-label-700">${item.isGift?'zdarma':kc(item.unitPrice*item.qty)}</span>
            </div>
          </div>
          <button class="product__remove" data-act="remove" data-id="${item.id}">${I.close}</button>
        </div>`).join("")}

      <div class="gift">
        <div class="gift__head" data-act="toggleGift">
          ${I.gift}
          <span class="gift__head-title t-label-500"><b>Zvolit k nákupu dárek zdarma</b></span>
          <span class="gift__chev ${state.giftOpen?'gift__chev--open':''}">${I.chevron}</span>
        </div>
        ${state.giftOpen ? `
          <div class="gift__list">
            <span class="gift__sub t-label-500">Vyberte si váš dárek</span>
            ${state.giftOptions.map(g => `
              <div class="gift-option ${state.selectedGift===g.id?'gift-option--sel':''}" data-act="selectGift" data-id="${g.id}">
                <div class="radio">${state.selectedGift===g.id?'<div class="radio__dot"></div>':''}</div>
                <div class="gift-option__img" style="background:${g.image}"></div>
                <div class="gift-option__text">
                  <span class="gift-option__title t-label-400">${g.brand} <b>${g.name}</b></span>
                  <span class="gift-option__desc t-label-sm">${g.desc}</span>
                </div>
              </div>`).join("")}
          </div>` : ""}
      </div>

      <div class="services">
        ${state.services.map(s => `
          <div class="service">
            <div class="service__row" data-act="toggleService" data-key="${s.key}">
              <div class="checkbox ${s.checked?'checkbox--on':''}">${s.checked?I.check:''}</div>
              <span class="service__title t-label-500">${s.title}</span>
              ${s.hasInfo?I.info:''}
              <span class="service__price t-label-500">${kc(s.price)}</span>
            </div>
            <p class="service__desc t-label-400">${s.desc}</p>
          </div>`).join("")}
      </div>

      <div class="disc-line t-label-500"><span>Sleva na dopravu 100 %</span></div>

      <div class="voucher">
        <span class="voucher__title t-label-500">Kód dárkového poukazu nebo slevy</span>
        <div class="voucher__box ${state.voucherErr?'voucher__box--err':''}">
          <input class="voucher__input" id="voucherInput" placeholder="Zadejte váš slevový kód" value="${esc(state.voucherInput)}">
          <button class="voucher__apply t-label-500" data-act="applyVoucher">Použít</button>
        </div>
        ${state.voucher?`<span class="voucher__msg t-label-sm">Kód ${state.voucher.label} použit — sleva ${kc(d.discount)}</span>`:''}
        ${state.voucherErr?'<span class="voucher__msg t-label-sm">Neplatný kód. Zkuste NOTINO10.</span>':''}
      </div>

      <div class="club">
        <span class="club__title t-label-500">Notino Club</span>
        <div class="club__banner">
          ${I.loyalty}
          <span class="club__banner-text t-label-400">Z této objednávky získáte <b>${fmt(d.points)} bodů</b>!</span>
        </div>
      </div>
    </div>

    <div class="total">
      <span class="total__label t-label-lg-400">Celková cena včetně DPH</span>
      <span class="total__amount t-title-lg">${kc(d.total)}</span>
    </div>
  </main>

  <div class="cta">
    <button class="btn btn--primary">K pokladně</button>
    <button class="btn btn--secondary">Zpět do obchodu</button>
  </div>`;

  // keep voucher input focus/caret after re-render if user was typing
  const vi = document.getElementById("voucherInput");
  if (vi && state._focusVoucher){ vi.focus(); vi.setSelectionRange(vi.value.length, vi.value.length); }
}

/* ---------- events (delegation) ---------- */
document.getElementById("app").addEventListener("click", e => {
  const el = e.target.closest("[data-act]");
  if (!el) return;
  const act = el.dataset.act;
  const id = el.dataset.id ? Number(el.dataset.id) : null;
  state._focusVoucher = false;
  if (act==="inc"){ const it=state.items.find(i=>i.id===id); it.qty++; }
  else if (act==="dec"){ const it=state.items.find(i=>i.id===id); it.qty=Math.max(1,it.qty-1); }
  else if (act==="remove"){ state.items=state.items.filter(i=>i.id!==id); }
  else if (act==="toggleGift"){ state.giftOpen=!state.giftOpen; }
  else if (act==="selectGift"){ state.selectedGift=id; }
  else if (act==="toggleService"){ const s=state.services.find(x=>x.key===el.dataset.key); s.checked=!s.checked; }
  else if (act==="applyVoucher"){
    const code=(state.voucherInput||"").trim().toUpperCase();
    if (VOUCHERS[code]){ state.voucher=VOUCHERS[code]; state.voucherErr=false; }
    else { state.voucher=null; state.voucherErr=true; }
  } else return;
  render();
});

// track voucher input without full re-render on each keystroke
document.getElementById("app").addEventListener("input", e => {
  if (e.target.id==="voucherInput"){ state.voucherInput=e.target.value; state.voucherErr=false; }
});
document.getElementById("app").addEventListener("keydown", e => {
  if (e.target.id==="voucherInput" && e.key==="Enter"){
    const code=(state.voucherInput||"").trim().toUpperCase();
    state._focusVoucher=true;
    if (VOUCHERS[code]){ state.voucher=VOUCHERS[code]; state.voucherErr=false; }
    else { state.voucher=null; state.voucherErr=true; }
    render();
  }
});

render();
</script>
</body>
</html>
